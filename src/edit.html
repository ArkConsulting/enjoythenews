<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit — Horisonten</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: #fff;
      color: #111;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    .topbar {
      height: 52px;
      border-bottom: 2px solid #111;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem;
      flex-shrink: 0;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #111;
    }

    .logo span { color: #f59e0b; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .tag-badge {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      border: 1px solid #e8e8e8;
      padding: 0.3rem 0.65rem;
    }

    .tag-badge.has-version { color: #059669; border-color: #a7f3d0; background: #ecfdf5; }

    .publish-btn {
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #111;
      color: #fff;
      border: none;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    .publish-btn:hover { background: #333; }

    .back-link {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      text-decoration: none;
      border: 1px solid #e8e8e8;
      padding: 0.4rem 0.9rem;
      transition: all 0.15s;
    }

    .back-link:hover { border-color: #111; color: #111; }

    /* ── SPLIT LAYOUT ── */
    .layout {
      display: flex;
      height: calc(100% - 52px);
    }

    /* ── LEFT: PREVIEW ── */
    .preview-pane {
      flex: 0 0 62%;
      border-right: 2px solid #111;
      overflow: hidden;
    }

    .preview-pane iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── RIGHT: SIDEBAR ── */
    .sidebar {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── CHAT ── */
    .chat-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .message-role {
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #bbb;
    }

    .message.assistant .message-role { color: #f59e0b; }

    .message-body {
      font-size: 0.875rem;
      line-height: 1.6;
      color: #111;
    }

    .message.assistant .message-body {
      background: #fffbeb;
      border: 1px solid #fde68a;
      padding: 0.75rem 0.9rem;
    }

    .change-applied {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #059669;
      margin-top: 0.35rem;
    }

    .system-message {
      font-size: 0.8rem;
      color: #bbb;
      text-align: center;
      padding: 0.5rem 0;
    }

    .chat-input-row {
      padding: 0.875rem 1.25rem;
      border-top: 1px solid #ebebeb;
      display: flex;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      font-family: inherit;
      font-size: 0.875rem;
      color: #111;
      border: 1px solid #e8e8e8;
      padding: 0.55rem 0.75rem;
      outline: none;
      resize: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }

    .chat-input:focus { border-color: #111; }
    .chat-input::placeholder { color: #bbb; }

    .send-btn {
      font-family: inherit;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: #111;
      color: #fff;
      border: none;
      padding: 0 1rem;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      align-self: flex-end;
      height: 36px;
    }

    .send-btn:hover { background: #333; }
    .send-btn:disabled { background: #ccc; cursor: default; }

    /* ── VERSION PANEL ── */
    .version-pane {
      border-top: 2px solid #111;
      flex-shrink: 0;
    }

    .version-header {
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .version-header-label {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #bbb;
    }

    .version-toggle {
      font-size: 0.7rem;
      color: #bbb;
      transition: transform 0.15s;
    }

    .version-pane.open .version-toggle { transform: rotate(180deg); }

    .version-list {
      display: none;
      max-height: 180px;
      overflow-y: auto;
      border-top: 1px solid #ebebeb;
    }

    .version-pane.open .version-list { display: block; }

    .version-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1.25rem;
      border-bottom: 1px solid #f5f5f5;
    }

    .version-item-name {
      font-size: 0.875rem;
      font-weight: 600;
      color: #111;
    }

    .version-item-date {
      font-size: 0.68rem;
      color: #bbb;
      margin-top: 0.1rem;
    }

    .rollback-btn {
      font-family: inherit;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      background: none;
      border: 1px solid #e8e8e8;
      padding: 0.3rem 0.65rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .rollback-btn:hover { border-color: #111; color: #111; }

    .version-empty {
      padding: 0.75rem 1.25rem;
      font-size: 0.78rem;
      color: #bbb;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="logo">Horisont<span>en</span> <span style="font-weight:400;color:#bbb;font-size:0.85rem;">/ edit</span></div>
    <div class="topbar-right">
      <span class="tag-badge {% if current != 'unreleased' %}has-version{% endif %}">{{ current }}</span>
      <form method="post" action="/edit/publish" style="display:inline">
        <button type="submit" class="publish-btn">Publish {{ next_tag }}</button>
      </form>
      <a href="/" class="back-link">← View</a>
    </div>
  </div>

  <!-- SPLIT LAYOUT -->
  <div class="layout">

    <!-- LEFT: live preview -->
    <div class="preview-pane">
      <iframe src="/" id="preview" title="Live preview"></iframe>
    </div>

    <!-- RIGHT: sidebar -->
    <div class="sidebar">

      <!-- CHAT -->
      <div class="chat-pane">
        <div class="chat-messages" id="chat-messages">
          <div class="system-message">Describe a change and Claude will update the design.</div>
        </div>

        <div class="chat-input-row">
          <textarea
            class="chat-input"
            id="chat-input"
            rows="2"
            placeholder="Make the header dark blue…"
          ></textarea>
          <button class="send-btn" id="send-btn">Send</button>
        </div>
      </div>

      <!-- VERSION HISTORY (collapsible) -->
      <div class="version-pane" id="version-pane">
        <div class="version-header" id="version-toggle">
          <span class="version-header-label">Version history</span>
          <span class="version-toggle">▲</span>
        </div>
        <div class="version-list">
          {% if tags %}
            {% for tag in tags %}
            <div class="version-item">
              <div>
                <div class="version-item-name">{{ tag.name }}</div>
                <div class="version-item-date">{{ tag.date }}</div>
              </div>
              <form method="post" action="/edit/rollback/{{ tag.name }}">
                <button type="submit" class="rollback-btn">Rollback</button>
              </form>
            </div>
            {% endfor %}
          {% else %}
            <div class="version-empty">No versions yet.</div>
          {% endif %}
        </div>
      </div>

    </div>
  </div>

<script>
  // Version history toggle
  const versionPane = document.getElementById('version-pane');
  document.getElementById('version-toggle').addEventListener('click', () => {
    versionPane.classList.toggle('open');
  });

  // Chat — send on Enter (Shift+Enter for newline), button click
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const messages = document.getElementById('chat-messages');
  const preview = document.getElementById('preview');

  function appendMessage(role, text, changed) {
    const msg = document.createElement('div');
    msg.className = 'message ' + role;

    const roleEl = document.createElement('div');
    roleEl.className = 'message-role';
    roleEl.textContent = role === 'user' ? 'You' : 'Claude';

    const body = document.createElement('div');
    body.className = 'message-body';
    body.textContent = text;

    msg.appendChild(roleEl);
    msg.appendChild(body);

    if (changed) {
      const badge = document.createElement('div');
      badge.className = 'change-applied';
      badge.textContent = '✓ Change applied — preview updated';
      msg.appendChild(badge);
    }

    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    sendBtn.disabled = true;
    appendMessage('user', text, false);

    // Create assistant bubble immediately so text streams into it
    const assistantEl = document.createElement('div');
    assistantEl.className = 'message assistant';
    const roleEl = document.createElement('div');
    roleEl.className = 'message-role';
    roleEl.textContent = 'Claude';
    const bodyEl = document.createElement('div');
    bodyEl.className = 'message-body';
    assistantEl.appendChild(roleEl);
    assistantEl.appendChild(bodyEl);
    messages.appendChild(assistantEl);

    try {
      const res = await fetch('/edit/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop();

        for (const part of parts) {
          if (!part.startsWith('data: ')) continue;
          const event = JSON.parse(part.slice(6));

          if (event.type === 'text') {
            bodyEl.textContent += event.delta;
            messages.scrollTop = messages.scrollHeight;
          } else if (event.type === 'done') {
            // Replace raw streamed text (may include ```html block) with clean message
            bodyEl.textContent = event.message;
            if (event.changed) {
              const badge = document.createElement('div');
              badge.className = 'change-applied';
              badge.textContent = '✓ Change applied — preview updated';
              assistantEl.appendChild(badge);
              preview.src = preview.src;
            }
          }
        }
      }
    } catch {
      bodyEl.textContent = 'Something went wrong. Please try again.';
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
</script>

</body>
</html>
